<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Когнитивные практики</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            padding-bottom: 70px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 20px;
            border-top: 1px solid #e5e5e5;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            color: #999;
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 30px;
        }

        .nav-item.active {
            color: #1e4a76;
            font-weight: 600;
        }

        .nav-icon {
            font-size: 24px;
        }

        .screen {
            display: none;
            padding: 16px;
            animation: fadeIn 0.2s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .card h3 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: #1e4a76;
        }

        .card h4 {
            font-size: 0.95rem;
            margin: 12px 0 8px;
            color: #334155;
        }

        .mode-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .mode-tab {
            background: #e2e8f0;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .mode-tab.active {
            background: #1e4a76;
            color: white;
        }

        .history-item {
            background: #f8fafc;
            padding: 10px;
            border-radius: 14px;
            margin-bottom: 8px;
            font-size: 0.75rem;
            border-left: 3px solid #fbbf24;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 30px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 70px;
            height: 70px;
            background: #1e4a76;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }

        .stats {
            flex: 1;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .level-badge {
            background: #fbbf24;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .xp-bar {
            background: #e2e8f0;
            border-radius: 20px;
            height: 10px;
            margin: 8px 0;
            overflow: hidden;
        }

        .xp-fill {
            background: #fbbf24;
            height: 100%;
            width: 0%;
            border-radius: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 16px;
            margin-bottom: 12px;
            font-family: inherit;
            font-size: 0.9rem;
        }

        button {
            background: #1e4a76;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .exercise-item {
            background: #f0f9ff;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .exercise-name {
            font-weight: 700;
            font-size: 1rem;
            color: #1e4a76;
        }

        .exercise-desc {
            font-size: 0.8rem;
            color: #475569;
            margin: 6px 0;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
            cursor: pointer;
        }

        .warning-list {
            background: #fef2f2;
            padding: 12px;
            border-radius: 16px;
            margin-top: 10px;
        }

        .warning-item {
            color: #dc2626;
            font-size: 0.8rem;
            padding: 4px 0;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: #1e4a76;
            color: #fbbf24;
            text-align: center;
            padding: 12px;
            border-radius: 30px;
            z-index: 200;
            animation: fadeOut 1.5s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        .today-card {
            background: #fef9e3;
            border-left: 4px solid #fbbf24;
        }
    </style>
</head>
<body>

<div class="bottom-nav">
    <button class="nav-item active" data-screen="main">
        <span class="nav-icon">📝</span>
        <span>Главная</span>
    </button>
    <button class="nav-item" data-screen="notepad">
        <span class="nav-icon">📓</span>
        <span>Блокнот</span>
    </button>
    <button class="nav-item" data-screen="profile">
        <span class="nav-icon">👤</span>
        <span>Профиль</span>
    </button>
</div>

<!-- ГЛАВНАЯ -->
<div id="mainScreen" class="screen active">
    <div class="card">
        <h3>📝 Что хочешь записать?</h3>
        <div class="mode-buttons" id="modeTabs">
            <button class="mode-tab active" data-mode="cycle">🧠 Анализ цикла</button>
            <button class="mode-tab" data-mode="attention">👁️ Внимание</button>
            <button class="mode-tab" data-mode="dispute">⚖️ Оспаривание</button>
            <button class="mode-tab" data-mode="cards">📇 Карточки</button>
            <button class="mode-tab" data-mode="looksmax">💪 Луксмаксинг</button>
            <button class="mode-tab" data-mode="diction">🗣️ Дикция</button>
        </div>
        <div id="formArea"></div>
    </div>
    <div class="card">
        <h3>📜 Недавние записи</h3>
        <div id="historyList">Загрузка...</div>
    </div>
</div>

<!-- БЛОКНОТ -->
<div id="notepadScreen" class="screen">
    <div class="card">
        <h3>📓 Мой блокнот</h3>
        <textarea id="noteInput" placeholder="Что хочешь запомнить или записать..."></textarea>
        <button id="addNoteBtn">➕ Добавить заметку</button>
    </div>
    <div class="card">
        <h3>📌 Мои заметки</h3>
        <div id="notesList">Загрузка...</div>
    </div>
</div>

<!-- ПРОФИЛЬ -->
<div id="profileScreen" class="screen">
    <div class="card">
        <div class="profile-header">
            <div class="avatar">🧠</div>
            <div class="stats">
                <div class="stat-row">
                    <span>🔥 <span id="profileXP">0</span> XP</span>
                    <span class="level-badge" id="profileLevel">Ур. 1</span>
                </div>
                <div class="xp-bar"><div class="xp-fill" id="profileXpBar"></div></div>
            </div>
        </div>
        <div class="stat-row"><span>📅 Серия активности:</span><span id="streakCount">0</span> дней 🔥</div>
        <div class="stat-row"><span>📆 Всего активных дней:</span><span id="totalActiveDays">0</span></div>
        <div class="stat-row"><span>📝 Всего заданий:</span><span id="totalTasks">0</span></div>
    </div>
    <div class="card"><h3>🏆 Таблица уровней</h3><div id="levelsTable"></div></div>
</div>

<script>
    // ========== УРОВНИ ==========
    const levels = [
        { level: 1, name: "Бронзовый ученик", totalXP: 100 },
        { level: 2, name: "Серебряный новичок", totalXP: 300 },
        { level: 3, name: "Золотой путешественник", totalXP: 1300 },
        { level: 4, name: "Рубиновый болтун", totalXP: 2800 },
        { level: 5, name: "Изумрудный рассказчик", totalXP: 5000 },
        { level: 6, name: "Сапфировый писатель", totalXP: 8000 },
        { level: 7, name: "Аметистовый полиглот", totalXP: 12500 },
        { level: 8, name: "Жемчужный знаток", totalXP: 18500 },
        { level: 9, name: "Огненный мастер", totalXP: 26500 },
        { level: 10, name: "Легендарный носитель языка", totalXP: 36500 }
    ];

    // ========== ДАННЫЕ ==========
    let userXP = 0, lastVisitDate = "", streak = 0, totalActiveDays = 0, totalTasks = 0;
    let storage = { cycle: [], attention: [], dispute: [], cards: [], looksmax: [], diction: [] };
    let notes = [];
    let currentMode = "cycle";

    // ========== РАСПИСАНИЕ ДИКЦИИ ПО ДНЯМ ==========
    function getDictionPlan() {
        const days = ["воскресенье", "понедельник", "вторник", "среда", "четверг", "пятница", "суббота"];
        const today = new Date().getDay();
        const dayName = days[today];
        
        const plans = {
            "понедельник": { warmup: "3 мин (губы + язык + челюсть)", main: "Карандаш + скороговорки", extra: "Шёпот", extraDesc: "Прочитайте предложение громко, потом шёпотом, артикулируя в 2 раза сильнее" },
            "вторник": { warmup: "3 мин", main: "Карандаш + скороговорки", extra: "Ступеньки громкости", extraDesc: "Скажите фразу: тихо → средне → громко → очень громко" },
            "среда": { warmup: "3 мин", main: "Только карандаш (5 мин)", extra: "Перерыв", extraDesc: "Отдых, можно просто почитать вслух без нагрузки" },
            "четверг": { warmup: "3 мин", main: "Карандаш + скороговорки", extra: "Шёпот", extraDesc: "Прочитайте предложение громко, потом шёпотом" },
            "пятница": { warmup: "3 мин", main: "Карандаш + скороговорки", extra: "Шарики во рту", extraDesc: "Положите за щёки 2-3 леденца и чётко говорите скороговорку" },
            "суббота": { warmup: "3 мин", main: "Карандаш (5 мин)", extra: "Ступеньки громкости", extraDesc: "Скажите фразу: тихо → средне → громко → очень громко" },
            "воскресенье": { warmup: "Выходной", main: "Ничего не делать", extra: "Можно почитать вслух", extraDesc: "Отдых, но если хочется — почитайте книгу вслух 5 минут" }
        };
        
        return { dayName, plan: plans[dayName] };
    }

    // ========== ЗАГРУЗКА ==========
    function loadAll() {
        userXP = parseInt(localStorage.getItem("userXP") || "0");
        lastVisitDate = localStorage.getItem("lastVisitDate") || "";
        streak = parseInt(localStorage.getItem("streak") || "0");
        totalActiveDays = parseInt(localStorage.getItem("totalActiveDays") || "0");
        totalTasks = parseInt(localStorage.getItem("totalTasks") || "0");
        
        for (let k of ["cycle", "attention", "dispute", "cards", "looksmax", "diction"]) {
            let raw = localStorage.getItem(`cbt_${k}`);
            storage[k] = raw ? JSON.parse(raw) : [];
        }
        
        let notesRaw = localStorage.getItem("notes");
        notes = notesRaw ? JSON.parse(notesRaw) : [];
    }

    function saveAll() {
        localStorage.setItem("userXP", userXP);
        localStorage.setItem("lastVisitDate", lastVisitDate);
        localStorage.setItem("streak", streak);
        localStorage.setItem("totalActiveDays", totalActiveDays);
        localStorage.setItem("totalTasks", totalTasks);
        localStorage.setItem("notes", JSON.stringify(notes));
        for (let k of Object.keys(storage)) {
            localStorage.setItem(`cbt_${k}`, JSON.stringify(storage[k]));
        }
    }

    function updateStreak() {
        const today = new Date().toDateString();
        if (lastVisitDate !== today) {
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            if (lastVisitDate === yesterday.toDateString()) streak++;
            else streak = 1;
            lastVisitDate = today;
            totalActiveDays++;
            saveAll();
        }
    }

    function addXP(amount) {
        userXP += amount;
        totalTasks++;
        saveAll();
        updateStreak();
        updateProfileUI();
        showToast(`+${amount} XP!`);
        const newLevel = getCurrentLevel();
        const oldLevel = getCurrentLevelFromXP(userXP - amount);
        if (newLevel > oldLevel) showToast(`🎉 НОВЫЙ УРОВЕНЬ! ${levels[newLevel-1].name} 🎉`, 2000);
    }

    function getCurrentLevel() { let lvl = 1; for (let l of levels) if (userXP >= l.totalXP) lvl = l.level; return lvl; }
    function getCurrentLevelFromXP(xp) { let lvl = 1; for (let l of levels) if (xp >= l.totalXP) lvl = l.level; return lvl; }
    function getXPInCurrent() {
        const lvl = getCurrentLevel();
        if (lvl === 1) return userXP;
        const prevXP = levels[lvl-2]?.totalXP || 0;
        return userXP - prevXP;
    }
    function getXPNeeded() {
        const lvl = getCurrentLevel();
        if (lvl === 1) return 100;
        const prevXP = levels[lvl-2]?.totalXP || 0;
        return levels[lvl-1].totalXP - prevXP;
    }

    function updateProfileUI() {
        const lvl = getCurrentLevel();
        document.getElementById("profileXP").innerText = userXP;
        document.getElementById("profileLevel").innerText = `Ур. ${lvl} ${levels[lvl-1].name}`;
        document.getElementById("streakCount").innerText = streak;
        document.getElementById("totalActiveDays").innerText = totalActiveDays;
        document.getElementById("totalTasks").innerText = totalTasks;
        const percent = (getXPInCurrent() / getXPNeeded()) * 100;
        document.getElementById("profileXpBar").style.width = `${Math.min(100, percent)}%`;
        
        let html = "";
        for (let l of levels) {
            const isUnlocked = userXP >= l.totalXP;
            html += `<div style="display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee;">
                <span>${l.level}. ${l.name}</span>
                <span>${isUnlocked ? "✅" : `🔒 ${l.totalXP} XP`}</span>
            </div>`;
        }
        document.getElementById("levelsTable").innerHTML = html;
    }

    function showToast(msg, duration = 1500) {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }

    function renderHistory() {
        const entries = storage[currentMode];
        const container = document.getElementById("historyList");
        if (!entries.length) { container.innerHTML = '<div class="empty">✨ Нет записей</div>'; return; }
        let html = "";
        for (let e of entries.slice(0, 10)) {
            if (currentMode === "diction") {
                html += `<div class="history-item">📅 ${e.date}<br>🗣️ Тренировка дикции<br>✅ Выполнено: ${e.completed}</div>`;
            } else {
                html += `<div class="history-item">📅 ${e.date}<br>📝 Запись сохранена</div>`;
            }
        }
        container.innerHTML = html;
    }

    // ========== ДИКЦИЯ ==========
    let dictionCompleted = { warmup: false, main: false, extra: false };
    
    function renderDictionForm() {
        const { dayName, plan } = getDictionPlan();
        const isWeekend = dayName === "воскресенье";
        
        const container = document.getElementById("formArea");
        container.innerHTML = `
            <div class="today-card" style="background: #fef9e3; padding: 12px; border-radius: 16px; margin-bottom: 16px;">
                <div>📅 Сегодня: <strong>${dayName}</strong></div>
                <div>🗣️ ${isWeekend ? "Выходной! Отдыхаем" : "Тренировка дикции"}</div>
            </div>
            
            ${!isWeekend ? `
                <div class="exercise-item">
                    <div class="exercise-name">🔥 Разминка (${plan.warmup})</div>
                    <div class="exercise-desc">• Губы: «Трубочка-улыбка» 10 раз, «Рыбка» 5 сек<br>
                    • Язык: «Уколы» 10 раз, «Часики» 5 кругов<br>
                    • Челюсть: открыть-закрыть рот 5 раз</div>
                    <label class="checkbox-label"><input type="checkbox" id="warmupCheck"> ✅ Выполнил(а)</label>
                </div>
                
                <div class="exercise-item">
                    <div class="exercise-name">📖 Основное: ${plan.main}</div>
                    <div class="exercise-desc">${plan.main.includes("Карандаш") ? "Зажмите пробку/карандаш зубами и читайте вслух 2-3 минуты. После выньте — голос станет чётче." : ""}
                    ${plan.main.includes("скороговорки") ? "Скороговорки: «От топота копыт», «Бык тупогуб», «Кукушка кукушонку». Каждую медленно, потом быстрее." : ""}</div>
                    <label class="checkbox-label"><input type="checkbox" id="mainCheck"> ✅ Выполнил(а)</label>
                </div>
                
                <div class="exercise-item">
                    <div class="exercise-name">✨ Дополнительно: ${plan.extra}</div>
                    <div class="exercise-desc">${plan.extraDesc}</div>
                    ${plan.extra !== "Перерыв" ? `<label class="checkbox-label"><input type="checkbox" id="extraCheck"> ✅ Выполнил(а)</label>` : `<div style="color: #22c55e;">😌 Сегодня перерыв, отдохни</div>`}
                </div>
                
                <button id="saveDictionBtn" style="width: 100%; margin-top: 16px;">💾 Сохранить тренировку (+20 XP)</button>
            ` : `
                <div class="exercise-item" style="background: #e8f5e9;">
                    <div class="exercise-name">😌 Воскресенье — выходной</div>
                    <div class="exercise-desc">Можно почитать книгу вслух 5 минут для удовольствия</div>
                    <button id="saveDictionBtn" style="width: 100%; margin-top: 16px;">📖 Отметить чтение (+10 XP)</button>
                </div>
            `}
            
            <div style="margin-top: 16px;">
                <h4>📝 Скороговорки на сегодня</h4>
                <div class="warning-list" style="background: #f0f9ff;">
                    <div class="warning-item" style="color: #1e4a76;">• «От топота копыт пыль по полю летит»</div>
                    <div class="warning-item" style="color: #1e4a76;">• «Бык тупогуб, тупогубенький бычок»</div>
                    <div class="warning-item" style="color: #1e4a76;">• «Кукушка кукушонку купила капюшон»</div>
                </div>
            </div>
        `;
        
        if (!isWeekend) {
            document.getElementById("saveDictionBtn")?.addEventListener("click", () => {
                const warmup = document.getElementById("warmupCheck")?.checked || false;
                const main = document.getElementById("mainCheck")?.checked || false;
                const extra = document.getElementById("extraCheck")?.checked || false;
                const completed = [];
                if (warmup) completed.push("разминка");
                if (main) completed.push("основное");
                if (extra) completed.push("дополнительно");
                
                if (completed.length === 0) {
                    alert("Отметьте хотя бы одно выполненное упражнение");
                    return;
                }
                
                storage.diction.unshift({
                    id: Date.now(),
                    date: new Date().toLocaleString(),
                    completed: completed.join(", "),
                    day: dayName
                });
                localStorage.setItem("cbt_diction", JSON.stringify(storage.diction));
                addXP(20);
                renderHistory();
                showToast(`🗣️ +20 XP! Выполнено: ${completed.join(", ")}`);
                
                // Сброс чекбоксов
                document.getElementById("warmupCheck").checked = false;
                document.getElementById("mainCheck").checked = false;
                if (document.getElementById("extraCheck")) document.getElementById("extraCheck").checked = false;
            });
        } else {
            document.getElementById("saveDictionBtn")?.addEventListener("click", () => {
                storage.diction.unshift({
                    id: Date.now(),
                    date: new Date().toLocaleString(),
                    completed: "чтение вслух (выходной)",
                    day: "воскресенье"
                });
                localStorage.setItem("cbt_diction", JSON.stringify(storage.diction));
                addXP(10);
                renderHistory();
                showToast("📖 +10 XP! Хорошего отдыха");
            });
        }
    }

    // ========== ЛУКСМАКСИНГ ==========
    function renderLooksmaxForm() {
        const container = document.getElementById("formArea");
        container.innerHTML = `
            <div class="warning-list" style="margin-bottom: 16px;">
                <div class="warning-item">⚡ Убрать креатин на 3 недели — ключевое правило</div>
            </div>
            <div class="exercise-item"><div class="exercise-name">1. Глиссер челюсти</div><div class="exercise-desc">Челюсть выдвинуть вперёд + опустить подбородок к груди. 10 раз</div></div>
            <div class="exercise-item"><div class="exercise-name">2. Язык к подбородку</div><div class="exercise-desc">Вытянуть язык к подбородку. 8 раз, удержание 10 сек</div></div>
            <div class="exercise-item"><div class="exercise-name">3. Волна языком по нёбу</div><div class="exercise-desc">Провести языком по нёбу от зубов к горлу. 12 раз</div></div>
            <button id="saveLooksmaxBtn">💾 Сохранить тренировку (+20 XP)</button>
            <div style="margin-top: 16px;"><h4>🚫 Противопоказания</h4><div class="warning-list"><div class="warning-item">❌ Креатин, молочка, скрытый натрий, белый сахар</div></div></div>
        `;
        document.getElementById("saveLooksmaxBtn")?.addEventListener("click", () => {
            storage.looksmax.unshift({ id: Date.now(), date: new Date().toLocaleString(), exercise: "комплекс" });
            localStorage.setItem("cbt_looksmax", JSON.stringify(storage.looksmax));
            addXP(20);
            renderHistory();
            showToast("💪 +20 XP");
        });
    }

    // ========== ОСТАЛЬНЫЕ ФОРМЫ ==========
    function renderForm() {
        if (currentMode === "looksmax") { renderLooksmaxForm(); return; }
        if (currentMode === "diction") { renderDictionForm(); return; }
        
        const container = document.getElementById("formArea");
        if (currentMode === "cycle") {
            container.innerHTML = `<input type="text" id="situation" placeholder="Ситуация"><textarea id="thoughts" placeholder="Тревожные мысли"></textarea><textarea id="inner" placeholder="Внимание внутрь"></textarea><textarea id="behavior" placeholder="Защитное поведение"></textarea><textarea id="outcome" placeholder="Итог"></textarea><button id="saveBtn">💾 Сохранить (+20 XP)</button>`;
        } else if (currentMode === "attention") {
            container.innerHTML = `<input type="text" id="situation" placeholder="Ситуация"><textarea id="innerFocus" placeholder="Внутренний фокус"></textarea><textarea id="outerFocus" placeholder="Внешний фокус"></textarea><textarea id="shift" placeholder="Что изменилось"></textarea><button id="saveBtn">💾 Сохранить (+20 XP)</button>`;
        } else if (currentMode === "dispute") {
            container.innerHTML = `<textarea id="thought" placeholder="Мысль"></textarea><input type="text" id="distortion" placeholder="Искажение"><textarea id="questions" placeholder="Вопросы оспаривания"></textarea><textarea id="newThought" placeholder="Новая мысль"></textarea><button id="saveBtn">💾 Сохранить (+20 XP)</button>`;
        } else if (currentMode === "cards") {
            container.innerHTML = `<textarea id="front" placeholder="Лицевая сторона"></textarea><textarea id="back" placeholder="Обратная сторона"></textarea><button id="saveBtn">➕ Добавить карточку (+20 XP)</button>`;
        }
        
        document.getElementById("saveBtn")?.addEventListener("click", () => {
            let data = {};
            if (currentMode === "cycle") data = { situation: document.getElementById("situation")?.value, thoughts: document.getElementById("thoughts")?.value, inner: document.getElementById("inner")?.value, behavior: document.getElementById("behavior")?.value, outcome: document.getElementById("outcome")?.value };
            else if (currentMode === "attention") data = { situation: document.getElementById("situation")?.value, innerFocus: document.getElementById("innerFocus")?.value, outerFocus: document.getElementById("outerFocus")?.value, shift: document.getElementById("shift")?.value };
            else if (currentMode === "dispute") data = { thought: document.getElementById("thought")?.value, distortion: document.getElementById("distortion")?.value, questions: document.getElementById("questions")?.value, newThought: document.getElementById("newThought")?.value };
            else if (currentMode === "cards") data = { front: document.getElementById("front")?.value, back: document.getElementById("back")?.value };
            
            if (!Object.values(data).some(v => v?.trim())) return alert("Заполните хотя бы одно поле");
            storage[currentMode].unshift({ id: Date.now(), date: new Date().toLocaleString(), ...data });
            localStorage.setItem(`cbt_${currentMode}`, JSON.stringify(storage[currentMode]));
            addXP(20);
            renderHistory();
            document.querySelectorAll("#formArea input, #formArea textarea").forEach(f => f.value = "");
        });
    }

    // ========== БЛОКНОТ ==========
    function renderNotes() {
        const container = document.getElementById("notesList");
        if (!notes.length) { container.innerHTML = '<div class="empty">📭 Нет заметок</div>'; return; }
        let html = "";
        for (let i = 0; i < notes.length; i++) {
            html += `<div class="note-item"><span>📝 ${escapeHtml(notes[i])}</span><button class="delete-note" data-index="${i}">🗑️</button></div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll(".delete-note").forEach(btn => {
            btn.addEventListener("click", () => { notes.splice(parseInt(btn.dataset.index), 1); saveAll(); renderNotes(); });
        });
    }

    function addNote() { const input = document.getElementById("noteInput"); if (input.value.trim()) { notes.unshift(input.value.trim()); saveAll(); renderNotes(); input.value = ""; showToast("📌 Заметка сохранена"); } }
    function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[m])); }

    // ========== НАВИГАЦИЯ ==========
    function switchScreen(screenId) {
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        document.getElementById(`${screenId}Screen`).classList.add("active");
        document.querySelectorAll(".nav-item").forEach(btn => btn.classList.remove("active"));
        document.querySelector(`.nav-item[data-screen="${screenId}"]`).classList.add("active");
        if (screenId === "profile") updateProfileUI();
        if (screenId === "notepad") renderNotes();
        if (screenId === "main") renderHistory();
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    loadAll();
    updateStreak();
    renderForm();
    renderHistory();
    updateProfileUI();
    renderNotes();

    document.querySelectorAll(".nav-item").forEach(btn => btn.addEventListener("click", () => switchScreen(btn.dataset.screen)));
    document.querySelectorAll(".mode-tab").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".mode-tab").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentMode = btn.dataset.mode;
            renderForm();
            renderHistory();
        });
    });
    document.getElementById("addNoteBtn")?.addEventListener("click", addNote);
</script>
</body>
</html>
